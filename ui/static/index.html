<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kalshi-bot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>kalshi-bot</h1>
    <span id="mode-badge" class="badge">...</span>
  </header>

  <section id="summary" class="cards">
    <div class="card">
      <div class="card-label">Daily PnL</div>
      <div class="card-value" id="daily-pnl">-</div>
    </div>
    <div class="card">
      <div class="card-label">Logged Open Positions</div>
      <div class="card-value" id="open-positions-logged">-</div>
    </div>
    <div class="card">
      <div class="card-label">Account Balance</div>
      <div class="card-value" id="balance">-</div>
    </div>
    <div class="card">
      <div class="card-label">Kalshi Open Positions</div>
      <div class="card-value" id="kalshi-positions">-</div>
    </div>
  </section>

  <div id="wizard"></div>

  <section id="history-section">
    <h2>Recent Trades</h2>
    <table>
      <thead>
        <tr>
          <th>Time (UTC)</th><th>Ticker</th><th>Side</th><th>Size ($)</th>
          <th>Conf</th><th>Edge</th><th>Status</th><th>Outcome</th><th>Reasoning</th>
        </tr>
      </thead>
      <tbody id="trades-body">
        <tr><td colspan="8">Loading…</td></tr>
      </tbody>
    </table>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
