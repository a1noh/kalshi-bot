services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./trades.db:/app/trades.db
    restart: unless-stopped

  ui:
    build: .
    command: uvicorn ui.app:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - ./trades.db:/app/trades.db
    ports:
      - "8000:8000"
    restart: unless-stopped
